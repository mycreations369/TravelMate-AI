<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelMate AI</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="hero">
<h1>🌍 TravelMate AI</h1>
<p>Your Personal Travel Friend</p>
</div>

<div class="container">

<label>📍 Starting City</label>
<input type="text" id="city" placeholder="Enter your city">

<label>🎯 Destination</label>
<input type="text" id="destination" placeholder="Where do you want to go?">

  <button onclick="startVoiceInput()">
🎤 Voice Search
</button>

<label>💰 Budget (₹)</label>
<input type="number" id="budget" placeholder="Enter budget">

<label>📅 Number of Days</label>
<input type="number" id="days" placeholder="Enter days">

<label>👥 Travel Type</label>
<select id="travelType">
<option>Solo</option>
<option>Family</option>
<option>Friends</option>
<option>Couple</option>
</select>

<button onclick="generatePlan()">
✨ Generate Travel Plan
</button>

<button onclick="downloadPlan()">
📥 Download Plan
</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
